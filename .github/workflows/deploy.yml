name: Deploy to EC2 (Docker)

on:
  workflow_run:
    workflows: ["CodeQL"]
    types:
      - completed
  workflow_dispatch:

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Run tests
        run: ./mvnw -B test

      - name: Build jar
        run: ./mvnw -B clean package -DskipTests

      - name: Create .env.prod for Deployment
        run: |
          echo "DB_IMAGE=mariadb:10.11" >> .env.prod
          echo "MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}" >> .env.prod
          echo "MYSQL_DATABASE=board" >> .env.prod
          echo "MYSQL_USER=appuser" >> .env.prod
          echo "MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}" >> .env.prod
          echo "SPRING_DATASOURCE_USERNAME=appuser" >> .env.prod
          echo "SPRING_DATASOURCE_PASSWORD=${{ secrets.MYSQL_PASSWORD }}" >> .env.prod
          echo "SPRING_DATASOURCE_URL=jdbc:mariadb://db:3306/board?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Tokyo" >> .env.prod
          echo "SPRING_MAIL_USERNAME=${{ secrets.SPRING_MAIL_USERNAME }}" >> .env.prod
          echo "SPRING_MAIL_PASSWORD=${{ secrets.SPRING_MAIL_PASSWORD }}" >> .env.prod
          echo "HMAC_SECRET=${{ secrets.HMAC_SECRET }}" >> .env.prod

      - name: Add SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Sync project to EC2
        run: |
          rsync -avz --delete \
            --exclude ".ssh/" \
            --exclude ".bash_history" \
            --exclude "logs/" \
            -e "ssh -o StrictHostKeyChecking=no" \
            ./ \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:${{ secrets.EC2_APP_DIR }}/

      - name: Restart Docker on EC2
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
          cd ${{ secrets.EC2_APP_DIR }}
          docker-compose --env-file .env.prod down
          docker-compose --env-file .env.prod build --no-cache
          docker-compose --env-file .env.prod up -d
          EOF
