privacy.title=Privacy Policy
privacy.heading=Privacy Policy
privacy.intro=This service (hereinafter referred to as "the Service") establishes the following Privacy Policy to properly handle users' personal information.

privacy.section1.title=1. Information We Collect
privacy.section1.body=The Service collects the following information when users access or post on the bulletin board:\n\n・IP address\n・User-Agent (browser information)\n・Access date and time\n・Cookies (session ID, etc.)\n・Post content\n・When using the login feature: user ID

privacy.section2.title=2. Purpose of Use
privacy.section2.body=The collected information is used for the following purposes:\n\n・Preventing unauthorized access, spam, and abusive behavior\n・Cooperating with investigations of illegal or criminal activities\n・Responding to sender information disclosure requests\n・Ensuring stable operation and improving service quality\n・User support and verification

privacy.section3.title=3. Retention Period
privacy.section3.body=IP addresses and access logs are retained for up to 90 days for security and misuse prevention.\nPost content is retained for as long as necessary for service operation.

privacy.section4.title=4. Provision to Third Parties
privacy.section4.body=The Service does not provide collected information to third parties except in the following cases:\n\n・When required by law\n・When disclosure is necessary for criminal investigations or court orders\n・When responding to sender information disclosure requests

privacy.section5.title=5. Security Measures
privacy.section5.body=The Service implements reasonable security measures to prevent unauthorized access, leakage, or alteration of collected information.

privacy.section6.title=6. User Rights
privacy.section6.body=Users may request disclosure, correction, or deletion of their personal information.\nFor inquiries, please contact the administrator.

privacy.section7.title=7. Changes to This Policy
privacy.section7.body=This policy may be updated as necessary.\nThe revised policy becomes effective when posted on this page.

privacy.footer=© 2026 Bulletin Board


terms.title=Terms of Service
terms.heading=Terms of Service
terms.intro=These Terms of Service (hereinafter referred to as "the Terms") define the conditions for using the service "spring-bbs" (hereinafter referred to as "the Service").\nUsers of the Service (hereinafter referred to as "Users") are deemed to have agreed to the Terms.

terms.section1.title=Article 1 (Scope)
terms.section1.body=The Terms apply to all relationships related to the provision and use of the Service.\nIf separate policies such as the Privacy Policy exist, they constitute part of the Terms.

terms.section2.title=Article 2 (User Registration)
terms.section2.body=1. Some features of the Service may require user registration.\n2. Users must register truthful and accurate information.\n3. Users are responsible for managing their registered email address and password and must not transfer or lend them to third parties.\n4. If false information is detected, the Service may refuse registration or suspend/delete the account.

terms.section3.title=Article 3 (Prohibited Acts)
terms.section3.body=Users must not engage in the following acts when using the Service:\n\n・Acts that violate laws or public order and morals\n・Criminal acts or acts that may lead to criminal activity\n・Defamation, discriminatory expressions, or actions that damage the honor or credibility of others\n・Infringement of others' personal information or privacy\n・Impersonation or registration/posting using false information\n・Spam posting, repeated identical posts, or disruptive behavior\n・Interference with the operation of the Service\n・Other acts deemed inappropriate by the Service

terms.section4.title=Article 4 (Handling of Posted Content)
terms.section4.body=1. Users are responsible for the content they post on the Service.\n2. The Service may delete or hide posted content without prior notice in the following cases:\n\n・When the content violates the Terms\n・When the content violates laws or is suspected of doing so\n・When a third party reports rights infringement\n・Other cases deemed inappropriate by the Service\n\n3. Users grant the Service a free license to use posted content to the extent necessary for operation, display, and improvement.

terms.section5.title=Article 5 (Changes, Suspension, or Termination of the Service)
terms.section5.body=The Service may change, suspend, or terminate its features without prior notice.\nThe Service bears no responsibility for any damages incurred by Users as a result.

terms.section6.title=Article 6 (Disclaimer)
terms.section6.body=1. The Service bears no responsibility for disputes between Users or between Users and third parties.\n2. The Service does not guarantee the accuracy, usefulness, or legality of posted content.\n3. The Service bears no responsibility for damages incurred by Users unless caused by intentional misconduct or gross negligence.

terms.section7.title=Article 7 (Intellectual Property Rights)
terms.section7.body=All intellectual property rights related to the Service, including programs, designs, and logos, belong to the Service or rightful owners.\nUsers must not use, reproduce, modify, or redistribute them without explicit permission.

terms.section8.title=Article 8 (Privacy Policy)
terms.section8.body=Handling of user information is governed by the separately defined Privacy Policy.\nUsers are deemed to have agreed to the Privacy Policy before using the Service.

terms.section9.title=Article 9 (Changes to the Terms)
terms.section9.body=The Service may modify the Terms when deemed necessary.\nThe revised Terms become effective when posted on this page.

terms.section10.title=Article 10 (Governing Law and Jurisdiction)
terms.section10.body=The Terms are governed by Japanese law.\nIn the event of a dispute, the court with jurisdiction over the Service operator's location shall be the exclusive court of first instance.

terms.contact.title=Contact Information
terms.contact.body=For inquiries regarding the Terms, please contact us via the inquiry form or the administrator contact information.

terms.footer=© 2026 Bulletin Board
