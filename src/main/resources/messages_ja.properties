privacy.title=プライバシーポリシー
privacy.heading=プライバシーポリシー
privacy.intro=本サービス（以下「当サービス」）は、ユーザーの個人情報を適切に取り扱うため、以下のとおりプライバシーポリシーを定めます。

privacy.section1.title=1. 取得する情報
privacy.section1.body=当サービスは、ユーザーが掲示板へアクセスまたは投稿を行う際に、以下の情報を取得します。\n\n・IPアドレス\n・User-Agent（ブラウザ情報）\n・アクセス日時\n・Cookie（セッションID等）\n・投稿内容\n・ログイン機能を利用する場合：ユーザーID

privacy.section2.title=2. 利用目的
privacy.section2.body=取得した情報は、以下の目的で利用します。\n\n・不正アクセス、スパム投稿、荒らし行為の防止\n・違法行為・犯罪行為に関する調査への協力\n・発信者情報開示請求への対応\n・サービスの安定運用および品質向上\n・ユーザーサポートのための確認

privacy.section3.title=3. 保存期間
privacy.section3.body=IPアドレスおよびアクセスログは、セキュリティ対策および不正利用防止のため、取得日から最大90日間保存します。\n投稿内容は、サービス運営上必要な期間保存します。

privacy.section4.title=4. 第三者提供
privacy.section4.body=当サービスは、以下の場合を除き、取得した情報を第三者に提供しません。\n\n・法令に基づく場合\n・犯罪捜査や裁判所の命令により開示が必要な場合\n・発信者情報開示請求に応じる場合

privacy.section5.title=5. セキュリティ対策
privacy.section5.body=当サービスは、取得した情報を適切に管理し、不正アクセス・漏洩・改ざんを防止するための合理的な安全対策を講じます。

privacy.section6.title=6. ユーザーの権利
privacy.section6.body=ユーザーは、自己の個人情報について、開示・訂正・削除を求めることができます。\nお問い合わせは運営者までご連絡ください。

privacy.section7.title=7. プライバシーポリシーの変更
privacy.section7.body=本ポリシーの内容は、必要に応じて変更される場合があります。\n変更後のポリシーは、本ページに掲載した時点で効力を生じます。

privacy.footer=© 2026 掲示板


terms.title=利用規約
terms.heading=利用規約
terms.intro=本利用規約（以下「本規約」）は、本サービス「spring-bbs」（以下「当サービス」）の利用条件を定めるものです。\n当サービスを利用するユーザー（以下「ユーザー」）は、本規約に同意したものとみなします。

terms.section1.title=第1条（適用範囲）
terms.section1.body=本規約は、当サービスの提供および利用に関する一切の関係に適用されます。\n当サービスに関して、プライバシーポリシーその他の規定がある場合、これらは本規約の一部を構成するものとします。

terms.section2.title=第2条（ユーザー登録）
terms.section2.body=1. 当サービスの一部機能の利用には、ユーザー登録が必要となる場合があります。\n2. ユーザー登録にあたり、ユーザーは真実かつ正確な情報を登録するものとします。\n3. ユーザーは、登録したメールアドレスおよびパスワードの管理責任を負うものとし、第三者に譲渡・貸与してはなりません。\n4. 登録情報に虚偽があると判断した場合、当サービスは登録の拒否またはアカウントの停止・削除を行うことができます。

terms.section3.title=第3条（禁止事項）
terms.section3.body=ユーザーは、当サービスの利用にあたり、以下の行為を行ってはなりません。\n\n・法令または公序良俗に違反する行為\n・犯罪行為、または犯罪行為に結びつくおそれのある行為\n・他者への誹謗中傷、差別的表現、名誉・信用を毀損する行為\n・他者の個人情報やプライバシーを侵害する行為\n・なりすまし、虚偽の情報を用いた登録・投稿行為\n・スパム投稿、同一内容の連続投稿、荒らし行為\n・当サービスの運営を妨害する行為\n・当サービスが不適切と判断するその他の行為

terms.section4.title=第4条（投稿内容の取り扱い）
terms.section4.body=1. ユーザーが当サービスに投稿した内容（テキスト等）は、ユーザー自身がその責任を負うものとします。\n2. 当サービスは、以下の場合において、事前の通知なく投稿内容を削除または非表示にすることができます。\n\n・本規約に違反すると判断した場合\n・法令違反またはそのおそれがあると判断した場合\n・第三者から権利侵害の申告があった場合\n・その他、当サービスが不適切と判断した場合\n\n3. ユーザーは、投稿内容について、当サービスの運営・表示・改善のために必要な範囲で、当サービスに対し無償で利用を許諾するものとします。

terms.section5.title=第5条（サービスの変更・中断・終了）
terms.section5.body=当サービスは、ユーザーへの事前通知なく、サービス内容の変更・一時中断・終了を行うことができます。\nこれによりユーザーに損害が生じた場合でも、当サービスは一切の責任を負いません。

terms.section6.title=第6条（免責事項）
terms.section6.body=1. 当サービスは、ユーザー間またはユーザーと第三者との間で生じたトラブルについて、一切の責任を負いません。\n2. 当サービスは、投稿内容の正確性・有用性・合法性等について保証しません。\n3. 当サービスの利用によりユーザーに生じた損害について、当サービスは故意または重過失がある場合を除き、一切の責任を負いません。

terms.section7.title=第7条（知的財産権）
terms.section7.body=当サービスに関するプログラム、デザイン、ロゴ等に関する著作権その他の知的財産権は、当サービスまたは正当な権利者に帰属します。\nユーザーは、当サービスの明示的な許可なく、これらを利用・複製・改変・転載してはなりません。

terms.section8.title=第8条（プライバシーポリシー）
terms.section8.body=当サービスにおけるユーザー情報の取り扱いについては、別途定める「プライバシーポリシー」に従うものとします。\nユーザーは、当サービスの利用に先立ち、プライバシーポリシーの内容を確認し、同意したものとみなされます。

terms.section9.title=第9条（規約の変更）
terms.section9.body=当サービスは、必要と判断した場合、本規約の内容を変更することができます。\n変更後の本規約は、本ページに掲載された時点で効力を生じるものとします。

terms.section10.title=第10条（準拠法・管轄）
terms.section10.body=本規約の解釈および適用には、日本法を準拠法とします。\n当サービスに関して紛争が生じた場合、当サービス運営者の所在地を管轄する裁判所を第一審の専属的合意管轄裁判所とします。

terms.contact.title=お問い合わせ窓口
terms.contact.body=本規約に関するお問い合わせは、当サービス内に設置するお問い合わせフォームまたは運営者連絡先までご連絡ください。

