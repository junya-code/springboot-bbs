<!doctype html>
<html lang="ja" layout:decorate="~{layout/layout}">
  <head>
    <meta name="description" layout:fragment="description" th:content="#{login.meta.description}" />
    <title layout:fragment="title" th:text="#{auth.login.title}"></title>
  </head>
  <body>
    <main layout:fragment="content">
      <h1 class="text-center">Login</h1>
      <form
        th:action="@{/auth/login}"
        method="post"
        class="mx-auto"
        style="max-width: 400px"
        th:object="${loginForm}"
      >
        <div class="mb-3">
          <label for="username" class="form-label">UserName</label>
          <input
            type="text"
            name="username"
            id="username"
            class="form-control"
            th:placeholder="#{auth.form.username.placeholder}"
            th:field="*{username}"
          />
          <div th:errors="*{username}" class="text-danger"></div>
        </div>
        <div class="mb-3">
          <label for="password" class="form-label">Password</label>
          <input
            type="password"
            name="password"
            id="password"
            class="form-control"
            th:placeholder="${#fields.hasErrors('password')} ?
                   #{auth.form.password.placeholder.error} :
                   #{auth.form.password.placeholder}"
            th:field="*{password}"
          />
          <div th:errors="*{password}" class="text-danger"></div>
        </div>

        <!-- ハニーポット（BOT が入力してしまう偽フィールド） -->
        <div style="display: none">
          <label>Leave this field empty</label>
          <input type="text" name="hp_field" autocomplete="off" />
        </div>

        <button type="submit" class="btn btn-primary w-100">Login</button>
      </form>
    </main>
  </body>
</html>
