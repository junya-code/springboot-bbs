<!doctype html>
<html lang="ja" layout:decorate="~{layout/layout}">
  <head>
    <meta
      name="description"
      layout:fragment="description"
      th:content="#{contact.form.meta.description}"
    />
    <title layout:fragment="title" th:text="#{contact.form.title}"></title>
  </head>
  <body>
    <main layout:fragment="content">
      <h1 class="mb-4" th:text="#{contact.form.heading}"></h1>
      <form th:action="@{/contact/confirm}" method="post" th:object="${contactForm}">
        <div class="mb-3">
          <label for="name" class="form-label" th:text="#{contact.form.name.label}"> </label>
          <input
            type="text"
            name="name"
            id="name"
            class="form-control"
            th:placeholder="#{contact.form.name.placeholder}"
            th:field="*{name}"
          />
          <div th:errors="*{name}" class="text-danger"></div>
        </div>

        <div class="mb-3">
          <label for="email" class="form-label" th:text="#{contact.form.email.label}"> </label>
          <input
            type="text"
            name="email"
            id="email"
            class="form-control"
            placeholder="例: example@gmail.com"
            th:field="*{email}"
          />
          <div th:errors="*{email}" class="text-danger"></div>
        </div>

        <div class="mb-3">
          <label for="message" class="form-label" th:text="#{contact.form.message.label}"> </label>
          <textarea
            name="message"
            id="message"
            class="form-control"
            rows="5"
            th:placeholder="#{contact.form.message.placeholder}"
            th:field="*{message}"
          ></textarea>
          <div th:errors="*{message}" class="text-danger"></div>
        </div>

        <!-- ハニーポット（BOT が入力してしまう偽フィールド） -->
        <div style="display: none">
          <label>Leave this field empty</label>
          <input type="text" name="hp_field" autocomplete="off" />
        </div>

        <button type="submit" class="btn btn-primary" th:text="#{contact.form.toConfirm}"></button>
      </form>
    </main>
  </body>
</html>
