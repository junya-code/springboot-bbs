<!doctype html>
<html
  lang="ja"
  xmlns:th="http://www.thymeleaf.org"
  xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="_csrf" th:content="${_csrf?.token}" />
    <meta name="_csrf_header" th:content="${_csrf?.headerName}" />
    <meta name="description" layout:fragment="description" th:content="#{top.meta.description}" />
    <title layout:fragment="title">Junya</title>
    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM"
      crossorigin="anonymous"
    />
    <!-- Bootstrap icon -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" th:href="@{/css/style.css}" />
  </head>

  <body style="padding-top: 55px">
    <!-- Header -->
    <header class="fixed-top">
      <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
          <a class="navbar-brand" th:href="@{/posts}" th:text="#{nav.posts}"></a>
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarNav"
            aria-controls="navbarNav"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav">
              <li class="nav-item">
                <a class="nav-link active" th:href="@{/}" th:text="#{nav.home}"></a>
              </li>
              <li class="nav-item" sec:authorize="!isAuthenticated()">
                <a class="nav-link active" th:href="@{/auth/login}" th:text="#{nav.login}"></a>
              </li>
              <li class="nav-item" sec:authorize="!isAuthenticated()">
                <a class="nav-link active" th:href="@{/auth/register}" th:text="#{nav.signup}"></a>
              </li>
              <li class="nav-item" sec:authorize="isAuthenticated()">
                <form th:action="@{/auth/logout}" method="post">
                  <button type="submit" class="nav-link active" th:text="#{nav.logout}"></button>
                </form>
              </li>
              <li class="nav-item">
                <a class="nav-link active" th:href="@{/contact}" th:text="#{nav.contact}"></a>
              </li>
            </ul>
          </div>
        </div>
      </nav>
    </header>

    <div th:if="${successMessage}" class="alert alert-success" role="alert">
      <div class="text-center">
        <strong th:text="#{${successMessage}}"></strong>
      </div>
    </div>

    <div th:if="${errorMessageKey}" class="alert alert-danger" role="alert">
      <div class="text-center">
        <strong th:text="#{${errorMessageKey}(${errorMessageArg})}"></strong>
      </div>
    </div>

    <div
      th:if="${param.badCredentials}"
      class="alert alert-danger alert-dismissible fade show"
      role="alert"
    >
      <div class="text-center">
        <strong th:text="#{auth.badCredentials}"></strong>
        <button type="button" class="btn" data-bs-dismiss="alert" aria-label="Close"></button>
      </div>
    </div>

    <div
      th:if="${param.locked}"
      class="alert alert-danger alert-dismissible fade show"
      role="alert"
    >
      <div class="text-center">
        <strong>
          <span th:text="#{auth.locked.line1}"></span><br />
          <span th:text="#{auth.locked.line2}"></span><br />
          <span th:text="#{auth.locked.line3}"></span>
        </strong>
        <button type="button" class="btn" data-bs-dismiss="alert" aria-label="Close"></button>
      </div>
    </div>

    <!-- Main Content -->
    <main class="container mt-2" layout:fragment="content"></main>

    <!-- Footer -->
    <footer class="bg-dark text-white text-center mt-4 py-3">
      <div class="footer-inner d-flex justify-content-center align-items-center gap-4">
        <span class="footer-title text-white" th:text="#{footer.copyright}"></span>

        <div class="footer-links d-flex gap-3">
          <a
            th:href="@{/posts/privacy}"
            class="btn btn-outline-light btn-sm rounded-pill px-3"
            th:text="#{footer.privacy}"
          >
          </a>
          <a
            th:href="@{/posts/terms}"
            class="btn btn-outline-light btn-sm rounded-pill px-3"
            th:text="#{footer.terms}"
          >
          </a>
        </div>
      </div>
    </footer>

    <!-- Bootstrap JS -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz"
      crossorigin="anonymous"
    ></script>

    <script src="/js/like.js" defer></script>
    <script src="/js/disable-submit.js"></script>
  </body>
</html>
