<!doctype html>
<html lang="ja" layout:decorate="~{layout/layout}">
  <head>
    <title layout:fragment="title" th:text="#{post.edit.title}"></title>
  </head>
  <body>
    <main layout:fragment="content">
      <h1>Edit Post</h1>
      <form th:action="@{/posts/{id}(id=${postId})}" method="post" th:object="${post}">
        <div class="mb-3">
          <label for="title" class="form-label">Title</label>
          <input type="text" id="title" name="title" class="form-control" th:field="*{title}" />
          <div th:errors="*{title}" class="text-danger"></div>
        </div>

        <div class="mb-3">
          <label for="content" class="form-label">Content</label>
          <textarea
            id="content"
            name="content"
            class="form-control"
            rows="5"
            th:field="*{content}"
          ></textarea>
          <div th:errors="*{content}" class="text-danger"></div>
        </div>

        <!-- ハニーポット（BOT が入力してしまう偽フィールド） -->
        <div style="display: none">
          <label>Leave this field empty</label>
          <input type="text" name="hp_field" autocomplete="off" />
        </div>

        <button type="submit" class="btn btn-success">Update</button>
        <a th:href="@{/posts/{id}(id=${postId})}" class="btn btn-dark">Cancel</a>
      </form>
    </main>
  </body>
</html>
