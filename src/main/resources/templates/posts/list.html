<!doctype html>
<html lang="ja" layout:decorate="~{layout/layout}">
  <head>
    <title layout:fragment="title" th:text="#{post.list.title}"></title>
  </head>
  <body>
    <main layout:fragment="content">
      <div>
        <h1>
          Post List
          <small class="text-muted"> &lt;@<span th:text="${loggedInUsername}"></span>&gt; </small>
        </h1>
      </div>

      <h2 th:text="#{post.new.heading}"></h2>

      <a th:href="@{/posts/new}" class="btn btn-primary mb-3">New Post</a>

      <form th:action="@{/posts}" method="get" class="mb-3">
        <div class="row">
          <div class="col-md-4 mb-2 mb-md-0">
            <label for="keyword" class="visually-hidden">検索キーワード</label>
            <input
              type="text"
              name="keyword"
              id="keyword"
              class="form-control"
              placeholder="Search"
              th:value="${param.keyword}"
            />
          </div>

          <div class="col-md-2 mb-2 mb-md-0">
            <select name="matchType" class="form-control">
              <option
                value="contains"
                th:selected="${param.matchType?.toString() == 'contains'}"
                th:text="#{search.match.contains}"
              ></option>

              <option
                value="startswith"
                th:selected="${param.matchType?.toString() == 'startswith'}"
                th:text="#{search.match.startswith}"
              ></option>

              <option
                value="endswith"
                th:selected="${param.matchType?.toString() == 'endswith'}"
                th:text="#{search.match.endswith}"
              ></option>
            </select>
          </div>

          <div class="col-md-2 mb-2 mb-md-0">
            <select name="sortBy" class="form-control">
              <option
                value="createdAt"
                th:selected="${param.sortBy?.toString() == 'createdAt'}"
                th:text="#{search.sort.createdAt}"
              ></option>

              <option
                value="title"
                th:selected="${param.sortBy?.toString() == 'title'}"
                th:text="#{search.sort.title}"
              ></option>
            </select>
          </div>

          <div class="col-md-2 mb-2 mb-md-0">
            <select name="sortOrder" class="form-control">
              <option
                value="desc"
                th:selected="${param.sortOrder?.toString() == 'desc'}"
                th:text="#{search.sort.desc}"
              ></option>

              <option
                value="asc"
                th:selected="${param.sortOrder?.toString() == 'asc'}"
                th:text="#{search.sort.asc}"
              ></option>
            </select>
          </div>

          <div class="col-md-2">
            <button type="submit" class="btn btn-primary" th:text="#{search.button}"></button>
          </div>
        </div>
      </form>

      <h2>のののg一覧</h2>
      <table class="table table-striped table-bordered">
        <thead>
          <tr>
            <th scope="col" style="width: 30%">Title</th>
            <th scope="col" style="width: 50%">Content</th>
            <th scope="col" style="width: 20%" class="text-end">Actions</th>
          </tr>
        </thead>

        <tbody>
          <tr th:each="post : ${posts}">
            <td data-label="Title" style="vertical-align: middle; padding-top: 6px">
              <a
                th:href="@{/posts/{id}(id=${post.id})}"
                th:text="${post.title.length() > 30 ? post.title.substring(0,30) + '…' : post.title}"
              ></a>
            </td>

            <td data-label="Content" style="vertical-align: middle; padding-top: 6px">
              <div
                th:text="${post.content.length() > 30 ? post.content.substring(0,30) + '…' : post.content}"
              ></div>
            </td>

            <td class="text-end" data-label="Actions">
              <div style="min-height: 32px">
                <div th:if="${post.user != null}">
                  <!-- 権限がある場合 -->
                  <div th:if="${loggedInUserId == post.user.id}">
                    <a th:href="@{/posts/{id}/edit(id=${post.id})}" class="btn btn-primary btn-sm"
                      >Edit</a
                    >
                    <form
                      th:action="@{/posts/{id}/delete(id=${post.id})}"
                      method="post"
                      style="display: inline"
                    >
                      <button type="submit" class="btn btn-danger btn-sm">Delete</button>
                    </form>
                  </div>

                  <!-- 権限がない場合（ボタンは表示するが押せない） -->
                  <div th:if="${loggedInUserId != post.user.id}">
                    <button class="btn btn-secondary btn-sm" disabled>Edit</button>
                    <button class="btn btn-secondary btn-sm" disabled>Delete</button>
                  </div>
                </div>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
      <nav aria-label="Page navigation" th:if="${posts.totalPages > 1}">
        <ul class="pagination justify-content-center">
          <li th:class="${posts.number == 0 ? 'page-item disabled' : 'page-item'}">
            <a
              class="page-link"
              th:href="@{/posts(page=${posts.number - 1},
                    keyword=${param.keyword}, matchType=${param.matchType}, sortBy=${param.sortBy}, sortOrder=${param.sortOrder})}"
              >Previous</a
            >
          </li>

          <li
            th:each="i : ${#numbers.sequence(0, posts.totalPages - 1)}"
            th:class="${i == posts.number ? 'page-item active' : 'page-item'}"
          >
            <a
              class="page-link"
              th:href="@{/posts(page=${i},
                    keyword=${param.keyword}, matchType=${param.matchType}, sortBy=${param.sortBy}, sortOrder=${param.sortOrder})}"
              th:text="${i + 1}"
            ></a>
          </li>

          <li
            th:class="${posts.number + 1 >= posts.totalPages ? 'page-item disabled' : 'page-item'}"
          >
            <a
              class="page-link"
              th:href="@{/posts(page=${posts.number + 1},
                    keyword=${param.keyword}, matchType=${param.matchType}, sortBy=${param.sortBy}, sortOrder=${param.sortOrder})}"
              >Next</a
            >
          </li>
        </ul>
      </nav>

      <th:block th:if="${posts.totalPages == 0}">
        <div>
          <p class="text-center text-danger my-3" th:text="#{post.none}"></p>
        </div>
      </th:block>
    </main>
  </body>
</html>
