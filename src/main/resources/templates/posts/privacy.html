  </head>
  <body>
    <main layout:fragment="content">
      <!-- 導入文 -->
      <p class="preline" th:text="#{privacy.intro}"></p>

      <!-- 1. 取得する情報 -->
      <h2 th:text="#{privacy.section1.title}"></h2>
      <p class="preline" th:text="#{privacy.section1.body}"></p>

      <h2 th:text="#{privacy.section3.title}"></h2>

      <!-- 4. 第三者提供 -->
      <h2 th:text="#{privacy.section4.title}"></h2>
      <p class="preline" th:text="#{privacy.section4.body}"></p>

      <!-- 5. セキュリティ対策 -->
      <h2 th:text="#{privacy.section5.title}"></h2>
      <p class="preline" th:text="#{privacy.section5.body}"></p>

      <!-- 6. ユーザーの権利 -->
      <h2 th:text="#{privacy.section6.title}"></h2>
      <p class="preline" th:text="#{privacy.section6.body}"></p>

      <h2 th:text="#{privacy.section7.title}"></h2>
      <p class="preline" th:text="#{privacy.section7.body}"></p>

      <!-- フッター -->
      <p class="preline" th:text="#{privacy.footer}"></p>

</html>
