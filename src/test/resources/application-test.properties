# 1. アプリケーション名
spring.application.name=bbs-test

# 2. データベース設定 (テスト用のH2メモリDB)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop

# 3. メール設定 (今回のエラーの直接の原因！)
# @Valueで読み込んでいる値をダミーで埋めて、起動エラーを防ぎます
spring.mail.host=localhost
spring.mail.port=25
spring.mail.username=test-user
spring.mail.password=test-password
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# 4. ログレベルの設定 (テスト失敗時に原因を追いやすくする)
logging.level.org.springframework.web=INFO
logging.level.com.example.bbs=DEBUG
logging.level.org.hibernate.SQL=DEBUG